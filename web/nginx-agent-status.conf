server {
    listen 80;
    server_name agent-status.example.com;

    root /path/to/agent-status/web;
    index index.html;

    # ── Local Status Service ──
    location /api/local/ {
        proxy_pass http://127.0.0.1:7890/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        # SSE: disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # ── Example: Remote Status Service (uncomment & edit) ──
    # location /api/remote-server/ {
    #     proxy_pass http://<remote-ip>:7890/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Connection '';
    #     proxy_buffering off;
    #     proxy_cache off;
    #     proxy_read_timeout 86400s;
    #     chunked_transfer_encoding off;
    # }

    # ── Serve web UI via Status Service ──
    location = / {
        proxy_pass http://127.0.0.1:7890/web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:7890;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
